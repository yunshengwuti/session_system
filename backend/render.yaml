# Render Blueprint configuration
version: 1

databases:
  - name: session-system-db
    databaseName: session_system
    user: session_user
    plan: free

services:
  - type: web
    name: session-system-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DATABASE_URL
        fromDatabase:
          name: session-system-db
          property: connectionString
      - key: ZHIPU_API_KEY
        sync: false
